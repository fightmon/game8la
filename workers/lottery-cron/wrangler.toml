name = "lottery-cron"
main = "src/index.js"
compatibility_date = "2024-09-25"

# ===== KV 綁定 =====
# 部署前先建好 KV namespace（見 README 步驟 2）
[[kv_namespaces]]
binding = "LOTTERY_KV"
id = "9dd8622881bc45598dc3720a1906e553"          # ← 換成你的

# ===== Cron 觸發 =====
# 539 每天開獎，威力彩 週一四，大樂透 週二五
# 設晚上 21:35 UTC+8 = 13:35 UTC
[triggers]
crons = ["35 13 * * *"]

# ===== 環境變數 =====
[vars]
# Cloudflare Pages 專案名稱（用來觸發重新部署）
CF_PAGES_PROJECT = "game8la-astro"

# ===== 機密變數（用 wrangler secret 設定，不要寫在這裡）=====
# CF_API_TOKEN   — Cloudflare API token（需要 Pages:Edit 權限）
# CF_ACCOUNT_ID  — 你的 Cloudflare Account ID
