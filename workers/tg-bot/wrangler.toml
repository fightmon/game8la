name = "game8la-tg-bot"
main = "index.js"
compatibility_date = "2024-12-01"

[triggers]
# 每天台灣時間 09:00 (UTC+8 → UTC 01:00) 發送今日推薦彩號
crons = ["0 1 * * *"]

[vars]
# 群組 Chat ID（部署後用 /chatid 指令取得，再填入）
TG_CHAT_ID = "-1003943550023"
# 網站 URL
SITE_URL = "https://game8la.com"
# 彩券 API
LOTTERY_API = "https://lottery-cron.game8la.workers.dev"

# Bot Token 放在 Secrets（不寫在這裡）
# wrangler secret put TG_BOT_TOKEN
