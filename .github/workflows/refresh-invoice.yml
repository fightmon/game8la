name: 自動更新統一發票中獎號碼

# 統一發票每兩個月（單月 25 日）開獎。
# 這個排程在開獎日前後自動重新 build + 部署，
# build 時會抓財政部官方 XML，把最新一期中獎號碼烤進靜態頁。
on:
  schedule:
    # UTC 時間：1/3/5/7/9/11 月的 25、26、27 日 07:00（涵蓋台灣開獎日後）
    - cron: '0 7 25,26,27 1,3,5,7,9,11 *'
  workflow_dispatch: {} # 也可在 Actions 頁面手動觸發

permissions:
  contents: read

concurrency:
  group: refresh-invoice
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build（build 時抓財政部 XML 帶入最新號碼）
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
